version: "3.9"

services:
  history:
    depends_on:
      database:
        condition: service_healthy
    build:
      context: .
      dockerfile: "Dockerfile"
      target: "history"
    env_file:
      - ".env"
    environment:
      BOT_RECYCLE_SECONDS: "${BOT_RECYCLE_SECONDS:-0}"
      BOT_RESTART_DELAY_SECONDS: "${BOT_RESTART_DELAY_SECONDS:-5}"
    command: >
      bash -c "
      while true; do
        echo '[history] starting bot process';
        python main.py &
        BOT_PID=$$!;

        if [ "$${BOT_RECYCLE_SECONDS:-0}" -gt 0 ]; then
          echo "[history] recycle in $${BOT_RECYCLE_SECONDS}s";
          sleep "$${BOT_RECYCLE_SECONDS}";
          kill -TERM "$$BOT_PID" 2>/dev/null || true;
        fi;

        wait "$$BOT_PID";
        EXIT_CODE=$$?;
        echo "[history] bot exited with code $$EXIT_CODE. restarting in $${BOT_RESTART_DELAY_SECONDS}s";
        sleep "$${BOT_RESTART_DELAY_SECONDS:-5}";
      done
      "
    restart: unless-stopped
    volumes:
      - "./apps/:/app/"
      - "./database/:/app/database/"
    networks:
      - local

  database:
    build:
      dockerfile: "Dockerfile"
      target: "database"
      context: .
    restart: unless-stopped
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: 1
      MARIADB_USER: "${DB_USER}"
      MARIADB_PASSWORD: "${DB_PASS}"
      MARIADB_DATABASE: "${DB_NAME}"
      MARIADB_ROOT_PASSWORD: "${DB_PASS}"
    expose:
      - 3306
    volumes:
      - db_data:/var/lib/mysql
      - "./database/dumps/:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - local

  backup:
    image: debian:bookworm-slim
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    volumes:
      - ./database/backups:/backup
    depends_on:
      database:
        condition: service_healthy
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y mariadb-client &&
      echo 'Waiting for database with authentication...' &&
      until mariadb-admin ping -h $$DB_HOST -u$$DB_USER -p$$DB_PASS --silent; do sleep 3; done &&
      echo 'Database is up and authenticated!' &&
      while true; do
        mysqldump -h $$DB_HOST -u$$DB_USER -p$$DB_PASS $$DB_NAME | gzip > /backup/backup_$$(date +%Y%m%d_%H%M).sql.gz;
        find /backup -type f -name '*.gz' -mtime +7 -delete;
        sleep 21600;
      done
      "
    networks:
      - local

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      - database
    networks:
      - local

networks:
  local:

volumes:
  db_data:
